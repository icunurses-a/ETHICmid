            { id: 33, category: "أسس الأخلاق", difficulty: "متوسط", page: "ص 11", priority: false, hint: "وظيفة الأنبياء", question: "الآية (ويزكيهم ويعلمهم الكتاب والحكمة) تدل على أي مصدر من مصادر الأخلاق؟", options: [ { text: "الفطري", isCorrect: false, rationale: "التزكية والتعليم أمور مكتسبة." }, { text: "التعليمي المكتسب", isCorrect: true, rationale: "تدل على أن الأخلاق تكتسب بالتعليم والتزكية." }, { text: "الإيماني", isCorrect: false, rationale: "الآية تركز على التعليم والتزكية (المكتسب)." }, { text: "العقلي", isCorrect: false, rationale: "لا تتحدث عن العقل." } ] },
            { id: 34, category: "أسس الأخلاق", difficulty: "متوسط", page: "ص 12", priority: true, hint: "الدافع الأعظم للمسلم", question: "ما هو المصدر (الأصل) للأخلاق الذي يجعل المسلم يراقب الله ويتطلع للثواب؟", options: [ { text: "المصدر الفطري", isCorrect: false, rationale: "الجميع يشترك فيه." }, { text: "المصدر التعليمي", isCorrect: false, rationale: "وسيلة اكتساب." }, { text: "المصدر الإيماني الجزائي", isCorrect: true, rationale: "مراقبة الله وانتظار الثواب هو المصدر الإيماني الجزائي، وهو الأساس للمسلم." }, { text: "المصدر العقلي", isCorrect: false, rationale: "العقل يدرك فقط." } ] },
            { id: 35, category: "أسس الأخلاق", difficulty: "سهل", page: "ص 12", priority: false, hint: "آية سورة آل عمران", question: "من صفات المتقين في القرآن (والكاظمين الغيظ والعافين عن الناس)، وهذا يمثل المصدر:", options: [ { text: "الإيماني الجزائي", isCorrect: true, rationale: "لأنها رتبت على ذلك الجنة والمغفرة (جزاء)." }, { text: "العقلي المحض", isCorrect: false, rationale: "العقل لا يضمن الجنة." }, { text: "التعليمي فقط", isCorrect: false, rationale: "السياق سياق ثواب." }, { text: "البيئي", isCorrect: false, rationale: "ليس من المصادر المذكورة." } ] },

            // Characteristics of Ethics
            { id: 36, category: "خصائص الأخلاق", difficulty: "سهل", page: "ص 12", priority: true, hint: "من أين نأخذ الأخلاق؟", question: "من خصائص الأخلاق الإسلامية (ربانية المصدر)، ماذا تعني؟", options: [ { text: "أنها مستمدة من كتاب الله وسنة رسوله", isCorrect: true, rationale: "تستمد مشروعيتها من الوحي، وليست من وضع البشر الخالص." }, { text: "أنها خاصة بالملائكة", isCorrect: false, rationale: "بل هي للمكلفين." }, { text: "أنها تتغير حسب المصلحة", isCorrect: false, rationale: "هذا يعارض الثبات." }, { text: "أنها مستمدة من العادات التقاليد", isCorrect: false, rationale: "العادات ليست مصدراً ربانياً." } ] },
            { id: 37, category: "خصائص الأخلاق", difficulty: "متوسط", page: "ص 12", priority: true, hint: "علاقة الأخلاق بالدين", question: "قوله ﷺ: (لا إيمان لمن لا أمانة له) يدل على أي خاصية من خصائص الأخلاق؟", options: [ { text: "الشمول", isCorrect: false, rationale: "الشمول يعني الاتساع." }, { text: "الارتباط الوثيق بين الأخلاق والعقيدة", isCorrect: true, rationale: "الأمانة (خلق) رُبطت بنفي كمال الإيمان (عقيدة)." }, { text: "الوسطية", isCorrect: false, rationale: "لا يظهر التوازن هنا." }, { text: "الثبات", isCorrect: false, rationale: "ليس السياق." } ] },
            { id: 38, category: "خصائص الأخلاق", difficulty: "صعب", page: "ص 13", priority: false, hint: "أثر معرفة الأسماء الحسنى", question: "الإيمان بأسماء الله الحسنى كالرقيب والحسيب يوجب على العبد الحياء ومحاسن الأخلاق. هذا يدل على ارتباط الأخلاق بـ:", options: [ { text: "العبادات", isCorrect: false, rationale: "هذا يخص العقيدة (توحيد الأسماء والصفات)." }, { text: "الدعوة", isCorrect: false, rationale: "ليست دعوة للغير." }, { text: "العقيدة", isCorrect: true, rationale: "معرفة الله وأسمائه من صميم العقيدة وتثمر الأخلاق." }, { text: "المعاملات المالية", isCorrect: false, rationale: "أعم من ذلك." } ] },
            { id: 39, category: "خصائص الأخلاق", difficulty: "متوسط", page: "ص 13", priority: true, hint: "إن الصلاة تنهى عن...", question: "ارتباط الأخلاق بـ (العبادات) يظهر جلياً في قوله تعالى:", options: [ { text: "إن الصلاة تنهى عن الفحشاء والمنكر", isCorrect: true, rationale: "الصلاة عبادة تثمر البعد عن مساوئ الأخلاق." }, { text: "وقولوا للناس حسنا", isCorrect: false, rationale: "أمر مجرد بالخلق." }, { text: "خذ من أموالهم صدقة", isCorrect: false, rationale: "تتحدث عن الزكاة لكن الشاهد الأقوى للفحشاء هو الصلاة." }, { text: "يا أيها الذين آمنوا اتقوا الله", isCorrect: false, rationale: "عامة." } ] },
            { id: 40, category: "خصائص الأخلاق", difficulty: "سهل", page: "ص 13", priority: false, hint: "الزكاة والصيام", question: "كيف ترتبط الزكاة بالأخلاق؟", options: [ { text: "بأنها تطهر النفس وتزكيها", isCorrect: true, rationale: "قال تعالى: (خذ من أموالهم صدقة تطهرهم وتزكيهم بها)." }, { text: "بأنها تعلم الصبر على الجوع", isCorrect: false, rationale: "هذا الصيام." }, { text: "بأنها تنمي القوة البدنية", isCorrect: false, rationale: "لا علاقة." }, { text: "بأنها تمنع الجدال", isCorrect: false, rationale: "هذا الحج." } ] },
            { id: 41, category: "خصائص الأخلاق", difficulty: "متوسط", page: "ص 13", priority: true, hint: "أثر الأخلاق في غير البشر", question: "قال ﷺ: (إذا قتلتم فأحسنوا القِتلة، وإذا ذبحتم فأحسنوا الذِبحَة)، هذا دليل على:", options: [ { text: "ضعف الحيوان", isCorrect: false, rationale: "المقصد هو إظهار خلق الإحسان." }, { text: "ارتباط الأخلاق بالمعاملات حتى مع غير البشر", isCorrect: true, rationale: "أمر بالإحسان في كل شيء، حتى عند ذبح الحيوان." }, { text: "أهمية أكل اللحوم", isCorrect: false, rationale: "ليس الهدف التربوي." }, { text: "صعوبة الذبح", isCorrect: false, rationale: "ليس المعنى." } ] },
            { id: 42, category: "خصائص الأخلاق", difficulty: "صعب", page: "ص 14", priority: true, hint: "قصة خديجة", question: "ما الذي استدلت به خديجة (رضي الله عنها) على أن الله لن يخزي النبي ﷺ أبداً؟", options: [ { text: "كثرة صلاته في غار حراء", isCorrect: false, rationale: "استدلت بأصول مكارم الأخلاق (التعامل مع الناس)." }, { text: "أصول مكارم الأخلاق لديه (صلة الرحم، كسب المعدوم...)", isCorrect: true, rationale: "تيقنت استحالة خزي من يحمل هذه المكارم العظيمة للخلق." }, { text: "نسبه الشريف في قريش", isCorrect: false, rationale: "النسب لا يعصم من البلاء لذاته." }, { text: "ثروته وتجارته", isCorrect: false, rationale: "لم تستدل بالمال." } ] },
            { id: 43, category: "خصائص الأخلاق", difficulty: "متوسط", page: "ص 14", priority: false, hint: "قصة جبل الصفا", question: "عندما جهر النبي ﷺ بالدعوة على جبل الصفا، وسأل قومه إن كانوا يصدقونه، أجابوا: (ما جربنا عليك إلا صدقاً)، يدل ذلك على ارتباط الأخلاق بـ:", options: [ { text: "العبادة", isCorrect: false, rationale: "ليس سياق عبادة." }, { text: "العقيدة", isCorrect: false, rationale: "الدعوة للعقيدة لكن السياق وسيلة تبليغ." }, { text: "الدعوة إلى الله", isCorrect: true, rationale: "رصيد الداعية من حسن الخلق أدعى لقبول دعوته." }, { text: "الثبات", isCorrect: false, rationale: "السمة هي تأثير الأخلاق في الدعوة." } ] },
            { id: 44, category: "خصائص الأخلاق", difficulty: "سهل", page: "ص 15", priority: true, hint: "تشمل كل شيء", question: "الأخلاق في الإسلام تشمل علاقة الإنسان بخالقه، وبنفسه، وببني جنسه، وبالمخلوقات الأخرى، تُعرف هذه الخاصية بـ:", options: [ { text: "الشمول", isCorrect: true, rationale: "تشمل كل مجالات الحياة والدوائر المحيطة بالإنسان." }, { text: "الثبات", isCorrect: false, rationale: "الثبات يعني عدم التغير." }, { text: "الوسطية", isCorrect: false, rationale: "الوسطية تعني التوازن." }, { text: "الربانية", isCorrect: false, rationale: "الربانية تتعلق بالمصدر." } ] },

            { id: 75, category: "العفة", difficulty: "صعب", page: "ص 23", priority: true, hint: "شمولية العفة", question: "هل العفة تقتصر فقط على (عفة الفرج) عن الحرام؟", options: [ { text: "نعم، هي المعنى الوحيد", isCorrect: false, rationale: "العفة أوسع." }, { text: "لا، بل تشمل عفة اللسان، وعفة أكل المال الحرام، وعفة النظر", isCorrect: true, rationale: "تشمل حفظ الجوارح واللسان عن الغيبة وأكل الحرام وسؤال الناس." }, { text: "تشمل الفرج واليد فقط", isCorrect: false, rationale: "تشمل اللسان والنظر أيضاً." }, { text: "تخص النساء فقط", isCorrect: false, rationale: "للرجال والنساء." } ] },

            { id: 78, category: "العفة", difficulty: "صعب", page: "ص 24", priority: false, hint: "قصة الغار", question: "في قصة الثلاثة الذين أُغلق عليهم الغار، توسل أحدهم بعفته حين أمكنته ابنة عمه من نفسها فقال لها:", options: [ { text: "لا أملك المال الكافي", isCorrect: false, rationale: "بل كان يملك مائة دينار وقدمها لها." }, { text: "أخاف أن يفتضح أمري", isCorrect: false, rationale: "كان في خلوة تامة." }, { text: "قام وتركها خشية من الله وتوسل بهذا العمل الصالح", isCorrect: true, rationale: "قالت له: اتق الله ولا تفض الخاتم إلا بحقه، فقام وتركها لله." }, { text: "أجبرها على الزواج", isCorrect: false, rationale: "غير صحيح." } ] },
            { id: 79, category: "العفة", difficulty: "سهل", page: "ص 24", priority: true, hint: "خطر الفاحشة", question: "ما هي العاقبة الدنيوية لشيوع الفاحشة وغياب العفة في المجتمع؟", options: [ { text: "زيادة الثروة", isCorrect: false, rationale: "عكس ذلك." }, { text: "اضطراب المجتمع، تفكك الأسر، وانتشار الجريمة", isCorrect: true, rationale: "ضياع العفة يؤدي لهلاك المجتمعات وتفككها." }, { text: "التقدم التقني المفرط", isCorrect: false, rationale: "لا علاقة مباشرة." }, { text: "انعزال الناس عن بعضهم", isCorrect: false, rationale: "بل انتشار الجرائم." } ] },

            { id: 85, category: "الحياء", difficulty: "متوسط", page: "ص 25", priority: true, hint: "موقف عثمان", question: "لماذا غطى النبي ﷺ فخذه عندما دخل عليه عثمان بن عفان رضي الله عنه؟", options: [ { text: "لأنه كان الجو بارداً", isCorrect: false, rationale: "غير صحيح." }, { text: "لأنه قال: (ألا أستحي من رجل تستحي منه الملائكة)", isCorrect: true, rationale: "تقديراً لحياء عثمان ومكانته." }, { text: "لأنه أراد الخروج", isCorrect: false, rationale: "غير صحيح." }, { text: "لأن عثمان طلب منه ذلك", isCorrect: false, rationale: "لم يطلب." } ] },

            { id: 89, category: "الحياء", difficulty: "سهل", page: "ص 26", priority: false, hint: "الفحش", question: "من قل حياؤه وقع في (البذاءة وفحش القول)، فكيف حكم الإسلام على الفُحش؟", options: [ { text: "مُحرم ومبغوض، قال تعالى: (لا يحب الله الجهر بالسوء من القول...)", isCorrect: true, rationale: "الفحش مبغوض وفاعله شَرُّ الناس." }, { text: "مكروه فقط", isCorrect: false, rationale: "بل محرم وموجب لعذاب الله." }, { text: "مباح إذا كان مازحاً", isCorrect: false, rationale: "محرم بكل حال." }, { text: "يُعذر به الجاهل", isCorrect: false, rationale: "السؤال عن الحكم المطلق." } ] },

            { id: 92, category: "الأخلاق الاجتماعية", difficulty: "متوسط", page: "ص 27", priority: false, hint: "سورة العصر", question: "جعل القرآن (التواصي بالحق والتواصي بالصبر) من خصال النجاة من الخسران في سورة العصر، فما معنى التواصي؟", options: [ { text: "أن يوصي الكبير الصغير فقط", isCorrect: false, rationale: "متبادل." }, { text: "أن يوصي بعض أفراد المجتمع بعضاً ويحث كل واحد الآخر على الخير", isCorrect: true, rationale: "التواصي صيغة تفاعل تعني التبادل بين جميع أفراد المجتمع." }, { text: "أن يكتب الإنسان وصيته قبل الموت", isCorrect: false, rationale: "تلك وصية الميراث." }, { text: "أن يتواصى الناس بالسكوت", isCorrect: false, rationale: "بل بالحق والصبر." } ] },
            { id: 93, category: "الأخلاق الاجتماعية", difficulty: "صعب", page: "ص 27", priority: false, hint: "كلام ابن سعدي", question: "قال ابن سعدي عن سورة العصر: (بالإيمان والعمل الصالح يكمل الإنسان نفسه، وبالتواصي بالحق والصبر يكمل...)", options: [ { text: "دينه", isCorrect: false, rationale: "صحيح لكن اللفظ لغيره." }, { text: "غيره (مجتمعه)", isCorrect: true, rationale: "التواصي موجه لإصلاح وتكميل المجتمع (الغير)." }, { text: "دنياه", isCorrect: false, rationale: "لا." }, { text: "عقله", isCorrect: false, rationale: "لا." } ] },
            { id: 94, category: "الأخلاق الاجتماعية", difficulty: "متوسط", page: "ص 28", priority: true, hint: "مواجهة الإساءة", question: "من أعظم كمال الأخلاق الاجتماعية (دفع السيئة بالحسنة)، ما ثمرة ذلك كما في الآية (ادفع بالتي هي أحسن...)؟", options: [ { text: "يُعاقب المسيء بالسجن", isCorrect: false, rationale: "هذا اختصاص القضاء." }, { text: "يتحول العدو المسيء كأنه ولي حميم (صديق مقرب)", isCorrect: true, rationale: "فإذا الذي بينك وبينه عداوة كأنه ولي حميم." }, { text: "يتم تجاهله للأبد", isCorrect: false, rationale: "هذا قطيعة." }, { text: "يُقابل بشتيمة أكبر", isCorrect: false, rationale: "هذا محرم." } ] },
            { id: 95, category: "الأخلاق الاجتماعية", difficulty: "سهل", page: "ص 28", priority: false, hint: "هل يحرم رد الإساءة؟", question: "هل يحرم في الإسلام أن يجازي الإنسان السيئة بسيئة مثلها (بالمثل دون اعتداء)؟", options: [ { text: "نعم، يحرم قطعاً ويجب العفو", isCorrect: false, rationale: "لا يحرم القصاص أو أخذ الحق بالمثل." }, { text: "لا يحرم، ولكن دفع السيئة بالحسنة أعلى وأحسن عاقبة", isCorrect: true, rationale: "القرآن يهذب النفس لترتقي للأعظم أجراً (العفو)." }, { text: "يحرم في حق الأقارب فقط", isCorrect: false, rationale: "يجوز أخذ الحق بضوابط." }, { text: "يجب الرد بمثلها وجوباً", isCorrect: false, rationale: "لا يجب، بل العفو أفضل." } ] },
            { id: 96, category: "الأخلاق الاجتماعية", difficulty: "صعب", page: "ص 28", priority: true, hint: "متى نترك العفو؟", question: "التوازن في الإسلام: متى يكون العفو والحلم عن المخطئ مذموماً، ويُعدل عنه إلى الحزم؟", options: [ { text: "إذا كان الخلاف على مال بسيط", isCorrect: false, rationale: "العفو فيه ممدوح." }, { text: "إذا كان العفو والتسامح يفضي إلى انتشار الظلم والتمادي في الشر", isCorrect: true, rationale: "الإسلام دين توازن، إذا كان العفو يشجع المجرم على جرائمه فالحزم والمجازاة أوجب لحماية المجتمع." }, { text: "إذا كان المخطئ من الأقارب", isCorrect: false, rationale: "العفو عن القريب أولى غالباً." }, { text: "العفو لا يُذم أبداً", isCorrect: false, rationale: "بل يذم إذا أدى للضعف والظلم." } ] },
            { id: 97, category: "الأخلاق الاجتماعية", difficulty: "متوسط", page: "ص 28", priority: false, hint: "الانتصار عند البغي", question: "قال تعالى ممتدحاً المؤمنين: (والذين إذا أصابهم البغي هم ينتصرون). متى يحمد الانتصار وأخذ الحق؟", options: [ { text: "إذا كان الجاني معتدياً ومُصراً على ظلمه", isCorrect: true, rationale: "ذكره العلماء، فالانتصار محمود على المصر، والعفو محمود للندمان." }, { text: "إذا كان الجاني ضعيفاً ومعتذراً", isCorrect: false, rationale: "هنا يُحمد العفو." }, { text: "في كل الأحوال بلا استثناء", isCorrect: false, rationale: "لا، العفو أفضل أحياناً." }, { text: "إذا كان سراً", isCorrect: false, rationale: "لا علاقة." } ] },
            { id: 98, category: "الأخلاق الاجتماعية", difficulty: "صعب", page: "ص 28", priority: false, hint: "قول ابن تيمية", question: "كيف جمع ابن تيمية بين مدح الانتصار (أخذ الحق) ومدح العفو في القرآن؟", options: [ { text: "قال إن الآيات متعارضة", isCorrect: false, rationale: "حاشا لله." }, { text: "قال إن الانتصار منسوخ بالعفو", isCorrect: false, rationale: "غير صحيح." }, { text: "قال: حمدهم على الانتصار عند البغي بقوة، والعفو عند المقدرة، بخلاف من يعفو عجزاً ووهناً", isCorrect: true, rationale: "فالعفو إنما يُحمد إذا كان ناشئاً عن قدرة وقوة، وليس عن ضعف وذل واستكانة." }, { text: "قال إن الانتصار للحكام فقط", isCorrect: false, rationale: "لم يقل ذلك هنا." } ] },
            { id: 99, category: "خصائص الأخلاق", difficulty: "سهل", page: "ص 15", priority: true, hint: "التوازن المالي", question: "قوله تعالى: (وكلوا واشربوا ولا تسرفوا) يمثل من خصائص الأخلاق:", options: [ { text: "الوسطية والاعتدال", isCorrect: true, rationale: "الاعتدال بين التقتير والتبذير." }, { text: "الثبات", isCorrect: false, rationale: "لا علاقة." }, { text: "ربانية المصدر", isCorrect: false, rationale: "وإن كانت من الله، لكن الآية تركز على الوسطية." }, { text: "الشمول", isCorrect: false, rationale: "تركز على الاستهلاك المعتدل." } ] },
            { id: 100, category: "الصدق", difficulty: "متوسط", page: "ص 19", priority: false, hint: "افتراء الكذب", question: "قال تعالى: (إنما يفتري الكذب الذين لا يؤمنون)، يدل ذلك على أن:", options: [ { text: "الكذاب كافر مخلد في النار", isCorrect: false, rationale: "الكذب ذنب ونفاق ولكنه لا يكفر بمفرده الكفر الأكبر إلا إذا كان كذباً بآيات الله." }, { text: "الكذب يتنافى مع كمال الإيمان", isCorrect: true, rationale: "لا يجتمع كمال الإيمان والكذب في قلب مسلم." }, { text: "الصدق غير واجب على الكفار", isCorrect: false, rationale: "مطلوب من الجميع." }, { text: "الإيمان هو الصدق المالي فقط", isCorrect: false, rationale: "بل هو أشمل." } ] }
        ];

        // Ensure no repeats and randomize options safely via a deep copy function
        const getFreshMCQs = () => {
            return mcqBank.map(q => ({
                ...q,
                options: [...q.options].sort(() => Math.random() - 0.5)
            }));
        };

        // --- THEMES ---
        const themes = [
            { id: 'classic', name: 'الكلاسيكي الأزرق', bg: 'bg-slate-50', text: 'text-slate-900', card: 'bg-white', primary: 'bg-blue-600', hover: 'hover:bg-blue-700', border: 'border-slate-200' },
            { id: 'dark', name: 'الوضع الليلي', bg: 'bg-gray-900', text: 'text-gray-100', card: 'bg-gray-800', primary: 'bg-indigo-500', hover: 'hover:bg-indigo-600', border: 'border-gray-700' },
            { id: 'cyberpunk', name: 'السايبربانك (نيون)', bg: 'bg-neutral-900', text: 'text-yellow-400', card: 'bg-neutral-800', primary: 'bg-pink-600', hover: 'hover:bg-pink-700', border: 'border-cyan-500' },
            { id: 'ocean', name: 'أعماق المحيط', bg: 'bg-cyan-900', text: 'text-cyan-50', card: 'bg-cyan-800', primary: 'bg-teal-500', hover: 'hover:bg-teal-600', border: 'border-cyan-700' },
            { id: 'forest', name: 'غابة خضراء', bg: 'bg-green-50', text: 'text-emerald-900', card: 'bg-white', primary: 'bg-emerald-600', hover: 'hover:bg-emerald-700', border: 'border-green-200' },
            { id: 'sunset', name: 'غروب برتقالي', bg: 'bg-orange-50', text: 'text-orange-950', card: 'bg-white', primary: 'bg-orange-500', hover: 'hover:bg-orange-600', border: 'border-orange-200' },
            { id: 'lavender', name: 'لافندر ناعم', bg: 'bg-fuchsia-50', text: 'text-purple-950', card: 'bg-white', primary: 'bg-purple-500', hover: 'hover:bg-purple-600', border: 'border-fuchsia-200' },
            { id: 'hacker', name: 'شاشة اختراق', bg: 'bg-black', text: 'text-green-500', card: 'bg-gray-900', primary: 'bg-green-700', hover: 'hover:bg-green-800', border: 'border-green-900' },
            { id: 'rose', name: 'وردي ذهبي', bg: 'bg-rose-50', text: 'text-rose-950', card: 'bg-white', primary: 'bg-rose-500', hover: 'hover:bg-rose-600', border: 'border-rose-200' },
            { id: 'sepia', name: 'ورق بني (قراءة)', bg: 'bg-amber-50', text: 'text-amber-900', card: 'bg-orange-100', primary: 'bg-amber-700', hover: 'hover:bg-amber-800', border: 'border-amber-200' }
        ];

        // --- CELEBRATIONS ---
        const celebrations = ["🎉", "🌟", "🔥", "🚀", "💯", "🧠", "🏆", "✨", "👏", "🎯", "🎊", "💡", "🥇", "⭐", "💪", "🎓", "😎", "🥳", "🙌", "💥"];
        const triggerConfetti = (typeIndex) => {
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            const emoji = celebrations[typeIndex % celebrations.length];
            
            if (typeIndex % 3 === 0) {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else if (typeIndex % 3 === 1) {
                confetti({
                    particleCount: 40,
                    scalar: 2,
                    shapes: ['text'],
                    shapeOptions: { text: { value: [emoji] } },
                    origin: { y: 0.6 }
                });
            } else {
                var duration = 1.5 * 1000;
                var animationEnd = Date.now() + duration;
                var interval = setInterval(function() {
                    var timeLeft = animationEnd - Date.now();
                    if (timeLeft <= 0) { return clearInterval(interval); }
                    var particleCount = 50 * (timeLeft / duration);
                    confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 } }));
                }, 250);
            }
        };

        // Create audio outside of the React component to prevent memory leaks and uninitialized errors
        const successAudio = new Audio('data:audio/mp3;base64,//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq');

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [screen, setScreen] = useState('intro'); // intro, setup, quiz, review
            const [theme, setTheme] = useState(themes[0]);
            
            // Setup Settings
            const [selectedCategories, setSelectedCategories] = useState([]);
            const [selectedDifficulty, setSelectedDifficulty] = useState('All');
            const [questionCount, setQuestionCount] = useState('All');
            const [mode, setMode] = useState('Comprehensive'); // Comprehensive, Exam
            
            // Quiz State
            const [activeMCQs, setActiveMCQs] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [answers, setAnswers] = useState({}); // { index: selectedOptionIndex }
            const [confidences, setConfidences] = useState({}); // { index: 'High' | 'Medium' | 'Low' }
            const [flagged, setFlagged] = useState({}); // { index: boolean }
            const [eliminated, setEliminated] = useState({}); // { index: [optIdx, optIdx] }
            const [showHint, setShowHint] = useState(false);
            const [isSplitScreen, setIsSplitScreen] = useState(true);
            const [timeLeft, setTimeLeft] = useState(0); // 0 means no timer
            const [examActive, setExamActive] = useState(false);
            const [quickReviewMode, setQuickReviewMode] = useState(false);
            const [toastMsg, setToastMsg] = useState(null);
            const [showSnaps, setShowSnaps] = useState(true);
            const [activeSnap, setActiveSnap] = useState(null);
            
            // Extract categories
            const allCategories = [...new Set(mcqBank.map(q => q.category))];

            // Start Quiz
            const startQuiz = () => {
                let filtered = getFreshMCQs();
                if (selectedCategories.length > 0) {
                    filtered = filtered.filter(q => selectedCategories.includes(q.category));
                }
                if (selectedDifficulty !== 'All') {
                    filtered = filtered.filter(q => q.difficulty === selectedDifficulty);
                }
                
                // Shuffle
                filtered = filtered.sort(() => Math.random() - 0.5);
                
                // Cut
                if (questionCount !== 'All') {
                    filtered = filtered.slice(0, parseInt(questionCount));
                }

                if (filtered.length === 0) {
                    setToastMsg("لا توجد أسئلة تطابق تصفيتك المحددة!");
                    setTimeout(() => setToastMsg(null), 3000);
                    return;
                }

                setActiveMCQs(filtered);
                setCurrentIndex(0);
                setAnswers({});
                setConfidences({});
                setFlagged({});
                setEliminated({});
                setShowHint(false);
                setQuickReviewMode(false);
                setActiveSnap(null);
                
                if (mode === 'Exam') {
                    setTimeLeft(filtered.length * 60);
                    setExamActive(true);
                } else {
                    setTimeLeft(0);
                    setExamActive(false);
                }
                
                setScreen('quiz');
            };

            // Timer
            useEffect(() => {
                let timer;
                if (screen === 'quiz' && examActive && timeLeft > 0) {
                    timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                } else if (timeLeft === 0 && examActive && screen === 'quiz') {
                    setScreen('review');
                }
                return () => clearInterval(timer);
            }, [screen, examActive, timeLeft]);

            const handleAnswer = (optIndex) => {
                if (answers[currentIndex] !== undefined && mode === 'Comprehensive') return;
                
                setAnswers(prev => ({ ...prev, [currentIndex]: optIndex }));
                
                const isCorrect = activeMCQs[currentIndex].options[optIndex].isCorrect;
                if (mode === 'Comprehensive' && isCorrect) {
                    try { successAudio.play().catch(e=>{}); } catch(e) {}
                    triggerConfetti(Math.floor(Math.random() * 20));
                }
            };

            const eliminate5050 = () => {
                if (eliminated[currentIndex]) return;
                const currentQ = activeMCQs[currentIndex];
                const incorrectIndices = currentQ.options.map((o, i) => o.isCorrect ? -1 : i).filter(i => i !== -1);
                incorrectIndices.sort(() => Math.random() - 0.5);
                setEliminated(prev => ({ ...prev, [currentIndex]: [incorrectIndices[0], incorrectIndices[1]] }));
            };

            const calculateScore = () => {
                let correct = 0;
                activeMCQs.forEach((q, i) => {
                    if (answers[i] !== undefined && q.options[answers[i]]?.isCorrect) correct++;
                });
                return correct;
            };

            // Intro Screen
            if (screen === 'intro') {
                return (
                    <div className={`min-h-screen ${theme.bg} ${theme.text} flex flex-col items-center justify-center relative overflow-hidden transition-colors duration-500`}>
                        {/* Decorative background elements */}
                        <div className="absolute top-0 left-0 w-full h-full overflow-hidden z-0 opacity-30 pointer-events-none">
                            <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob"></div>
                            <div className="absolute top-[20%] right-[-10%] w-96 h-96 bg-purple-400 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob animation-delay-2000"></div>
                            <div className="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-pink-400 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob animation-delay-4000"></div>
                        </div>

                        <div className="z-10 text-center fade-in flex flex-col items-center max-w-3xl px-6">
                            <div className="w-32 h-32 mb-8 bg-white text-blue-600 rounded-full flex items-center justify-center shadow-2xl animate-bounce-slow">
                                <i className="fa-solid fa-graduation-cap text-6xl"></i>
                            </div>
                            
                            <h1 className="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight drop-shadow-lg">
                                إتقان القيم والأخلاق
                            </h1>
                            
                            <p className="text-xl md:text-3xl font-light mb-8 opacity-90">
                                مرحباً بك في المنصة التفاعلية الشاملة
                            </p>
                            
                            <div className="mb-12 p-6 backdrop-blur-sm bg-black/5 rounded-3xl border border-gray-400/20 shadow-xl transform transition-transform hover:scale-105">
                                <p className="text-lg md:text-xl font-medium">
                                    إعداد وتصميم: <br/><span className="font-black text-yellow-500 text-3xl md:text-4xl drop-shadow-sm mt-2 block">عامر الشريف</span>
                                </p>
                            </div>

                            <button 
                                onClick={() => setScreen('setup')} 
                                className={`px-10 py-5 rounded-full font-bold text-white text-xl md:text-2xl transition-all duration-300 transform hover:scale-105 hover:shadow-2xl ${theme.primary} flex items-center gap-3 group`}
                            >
                                <span>الدخول للمنصة</span>
                                <i className="fa-solid fa-arrow-left transition-transform group-hover:-translate-x-2"></i>
                            </button>
                        </div>
                    </div>
                );
            }

            // Setup Screen
            if (screen === 'setup') {
                return (
                    <div className={`min-h-screen ${theme.bg} ${theme.text} p-6 flex flex-col items-center justify-center fade-in relative`}>
                        {toastMsg && (
                            <div className="absolute top-10 bg-red-500 text-white font-bold px-6 py-3 rounded-xl shadow-lg z-50 fade-in">
                                <i className="fa-solid fa-exclamation-circle ml-2"></i> {toastMsg}
                            </div>
                        )}
                        <div className={`max-w-2xl w-full ${theme.card} p-8 rounded-2xl shadow-xl border ${theme.border}`}>
                            <h1 className="text-4xl font-bold mb-2 flex items-center gap-3">
                                <i className="fa-solid fa-book-open text-4xl"></i>
                                إتقان القيم والأخلاق
                            </h1>
                            <p className="opacity-70 mb-8">محرك اختبارات عالي الجودة مستمد من المقرر الأكاديمي (100 سؤال شامل)</p>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div>
                                    <label className="block font-semibold mb-2">الأقسام (اتركه فارغاً لاختيار الكل)</label>
                                    <div className="space-y-2 mb-6 max-h-40 overflow-y-auto custom-scrollbar">
                                        {allCategories.map(cat => (
                                            <label key={cat} className="flex items-center gap-2 cursor-pointer">
                                                <input type="checkbox" 
                                                    checked={selectedCategories.includes(cat)}
                                                    onChange={(e) => {
                                                        if(e.target.checked) setSelectedCategories([...selectedCategories, cat]);
                                                        else setSelectedCategories(selectedCategories.filter(c => c !== cat));
                                                    }}
                                                    className="rounded border-gray-300"
                                                />
                                                <span className="text-sm">{cat}</span>
                                            </label>
                                        ))}
                                    </div>

                                    <label className="block font-semibold mb-2">درجة الصعوبة</label>
                                    <select className={`w-full p-2 rounded border ${theme.border} bg-transparent mb-6`} 
                                            value={selectedDifficulty} onChange={e => setSelectedDifficulty(e.target.value)}>
                                        <option value="All">جميع المستويات</option>
                                        <option value="سهل">سهل (تذكر)</option>
                                        <option value="متوسط">متوسط (فهم وتطبيق)</option>
                                        <option value="صعب">صعب (تحليل)</option>
                                    </select>
                                </div>

                                <div>
                                    <label className="block font-semibold mb-2">عدد الأسئلة</label>
                                    <select className={`w-full p-2 rounded border ${theme.border} bg-transparent mb-6`}
                                            value={questionCount} onChange={e => setQuestionCount(e.target.value)}>
                                        <option value="10">10 أسئلة</option>
                                        <option value="20">20 سؤالاً</option>
                                        <option value="50">50 سؤالاً</option>
                                        <option value="All">جميع الأسئلة (100)</option>
                                    </select>

                                    <label className="block font-semibold mb-2">نمط المذاكرة</label>
                                    <div className="flex gap-4 mb-4">
                                        <label className="flex items-center gap-2 cursor-pointer">
                                            <input type="radio" name="mode" value="Comprehensive" checked={mode === 'Comprehensive'} onChange={() => setMode('Comprehensive')} />
                                            <span className="text-sm">شامل (تغذية راجعة فورية)</span>
                                        </label>
                                        <label className="flex items-center gap-2 cursor-pointer">
                                            <input type="radio" name="mode" value="Exam" checked={mode === 'Exam'} onChange={() => setMode('Exam')} />
                                            <span className="text-sm">اختبار (مؤقت، بلا إجابات)</span>
                                        </label>
                                    </div>

                                    <label className="flex items-center gap-2 cursor-pointer mb-6 p-3 rounded-lg bg-blue-50 border border-blue-200 text-blue-900 transition hover:bg-blue-100">
                                        <input type="checkbox" checked={showSnaps} onChange={(e) => setShowSnaps(e.target.checked)} className="w-4 h-4 text-blue-600 rounded" />
                                        <span className="font-semibold text-sm"><i className="fa-solid fa-image ml-1"></i> تفعيل المحاكي المرجعي لصفحات المقرر</span>
                                    </label>
                                    
                                    <label className="block font-semibold mb-2">المظهر (الثيم)</label>
                                    <select className={`w-full p-2 rounded border ${theme.border} bg-transparent mb-6`}
                                            value={theme.id} onChange={e => setTheme(themes.find(t => t.id === e.target.value))}>
                                        {themes.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                    </select>
                                </div>
                            </div>

                            <button onClick={startQuiz} className={`w-full py-4 rounded-xl font-bold text-white text-lg transition-transform hover:scale-[1.02] ${theme.primary} shadow-lg flex items-center justify-center gap-2`}>
                                <i className="fa-solid fa-play"></i> ابدأ الجلسة
                            </button>
                        </div>
                    </div>
                );
            }

            // Quiz Screen
            if (screen === 'quiz') {
                const currentQ = activeMCQs[currentIndex];
                const hasAnswered = answers[currentIndex] !== undefined;
                const isCorrect = hasAnswered ? currentQ.options[answers[currentIndex]]?.isCorrect : false;

                const formatTime = (seconds) => {
                    const m = Math.floor(seconds / 60);
                    const s = seconds % 60;
                    return `${m}:${s < 10 ? '0' : ''}${s}`;
                };

                return (
                    <div className={`min-h-screen ${theme.bg} ${theme.text} flex flex-col fade-in transition-colors duration-300 relative`}>
                        {toastMsg && (
                            <div className="absolute top-20 left-1/2 transform -translate-x-1/2 bg-red-500 text-white font-bold px-6 py-3 rounded-xl shadow-lg z-50 fade-in text-center max-w-md">
                                <i className="fa-solid fa-exclamation-circle ml-2"></i> {toastMsg}
                            </div>
                        )}
                        
                        <header className={`${theme.card} border-b ${theme.border} p-4 flex justify-between items-center shadow-sm`}>
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsSplitScreen(!isSplitScreen)} className={`p-2 rounded ${theme.hover} border ${theme.border} hidden md:flex items-center gap-2`} title="تغيير العرض">
                                    <i className="fa-solid fa-columns"></i>
                                    <span className="text-sm font-semibold">{isSplitScreen ? 'ملء الشاشة' : 'تقسيم الشاشة'}</span>
                                </button>
                                <span className="font-bold hidden sm:block">سؤال: {currentIndex + 1} / {activeMCQs.length}</span>
                            </div>
                            
                            {mode === 'Exam' && (
                                <div className={`font-mono text-xl font-bold px-4 py-1 rounded bg-opacity-20 ${timeLeft < 60 ? 'bg-red-500 text-red-500' : ''}`}>
                                    {formatTime(timeLeft)}
                                </div>
                            )}

                            <div className="flex items-center gap-3">
                                <button onClick={() => setScreen('review')} className="px-4 py-2 rounded font-semibold text-sm bg-red-500 text-white hover:bg-red-600 transition">
                                    إنهاء الاختبار
                                </button>
                            </div>
                        </header>

                        <div className="h-1.5 w-full bg-gray-200 opacity-50">
                            <div className={`h-full ${theme.primary} transition-all duration-300`} style={{ width: `${((currentIndex + 1) / activeMCQs.length) * 100}%` }}></div>
                        </div>

                        <div className="flex-1 flex overflow-hidden">
                            {isSplitScreen && (
                                <div className={`w-1/3 border-l ${theme.border} ${theme.card} p-4 overflow-y-auto hidden md:block custom-scrollbar shadow-inner`}>
                                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><i className="fa-solid fa-book"></i> ملخص المقرر</h2>
                                    <div className="space-y-4">
                                        {studyNotes.map((note, idx) => (
                                            <div key={idx} className={`p-3 rounded border ${theme.border} ${note.priority ? 'border-r-4 border-r-yellow-400' : ''}`}>
                                                <h3 className="font-bold text-sm mb-1 flex items-center gap-1">
                                                    {note.priority && <i className="fa-solid fa-star text-yellow-500"></i>}
                                                    {note.category}
                                                </h3>
                                                <p className="text-xs opacity-80 leading-relaxed">{note.content}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="flex-1 p-4 md:p-8 overflow-y-auto relative flex flex-col items-center">
                                <div className={`max-w-3xl w-full flex-1 flex flex-col`}>
                                    
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="flex gap-2 flex-wrap">
                                            <span className={`text-xs font-bold px-2 py-1 rounded bg-opacity-20 uppercase tracking-wider ${theme.text} border ${theme.border}`}>{currentQ.category}</span>
                                            <span className={`text-xs font-bold px-2 py-1 rounded bg-opacity-20 uppercase tracking-wider ${theme.text} border ${theme.border}`}>{currentQ.difficulty}</span>
                                            <span className={`text-xs font-bold px-2 py-1 rounded bg-opacity-20 uppercase tracking-wider text-blue-500 border border-blue-200`}><i className="fa-solid fa-book-open text-xs inline ml-1"></i>{currentQ.page}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            {currentQ.priority && <i className="fa-solid fa-star text-2xl text-yellow-400" title="مهم جداً"></i>}
                                            <button onClick={() => setFlagged(prev => ({...prev, [currentIndex]: !prev[currentIndex]}))} title="تحديد للمراجعة">
                                                <i className={`fa-solid fa-flag text-xl transition-colors ${flagged[currentIndex] ? 'text-red-500' : 'opacity-30'}`}></i>
                                            </button>
                                        </div>
                                    </div>

                                    <h2 className="text-2xl md:text-3xl font-medium leading-snug mb-6">
                                        {currentQ.question}
                                    </h2>

                                    {showSnaps && !quickReviewMode && (
                                        <button onClick={() => setActiveSnap(currentQ)} className="mb-6 px-4 py-2 bg-slate-100 border border-slate-300 text-slate-700 rounded-lg text-sm font-bold flex items-center gap-2 hover:bg-slate-200 transition shadow-sm w-max">
                                            <i className="fa-solid fa-file-lines text-blue-500"></i> 
                                            مرجع صفحة المقرر
                                        </button>
                                    )}

                                    {quickReviewMode && (
                                        <div className="mb-6 p-4 rounded bg-green-500 bg-opacity-10 border border-green-500">
                                            <p className="font-bold text-green-600 mb-1">الإجابة الصحيحة:</p>
                                            <p className="text-lg">{currentQ.options.find(o => o.isCorrect)?.text}</p>
                                            <p className="mt-2 text-sm opacity-80 italic">{currentQ.options.find(o => o.isCorrect)?.rationale}</p>
                                        </div>
                                    )}

                                    {!hasAnswered && !quickReviewMode && (
                                        <div className="mb-6 p-4 rounded-xl border border-dashed border-gray-400 bg-opacity-5 text-center">
                                            <p className="text-sm font-semibold mb-3 opacity-70">تقييم الميتاكوجنيشن: ما مدى ثقتك بإجابتك عن هذا الموضوع؟</p>
                                            <div className="flex justify-center gap-4">
                                                {['منخفض', 'متوسط', 'عالي'].map(level => (
                                                    <button key={level} 
                                                        onClick={() => setConfidences(prev => ({...prev, [currentIndex]: level}))}
                                                        className={`px-4 py-1.5 rounded-full text-sm font-bold border transition ${confidences[currentIndex] === level ? theme.primary + ' text-white' : 'border-gray-400 hover:bg-gray-200 hover:text-black'}`}>
                                                        {level}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {!quickReviewMode && (
                                        <div className="space-y-3 mb-8 flex-1">
                                            {currentQ.options.map((option, idx) => {
                                                const isSelected = answers[currentIndex] === idx;
                                                const isEliminated = eliminated[currentIndex]?.includes(idx);
                                                
                                                let stateClass = `${theme.card} border ${theme.border} hover:border-gray-400 cursor-pointer`;
                                                
                                                if (hasAnswered && mode === 'Comprehensive') {
                                                    if (option.isCorrect) stateClass = "bg-green-100 border-green-500 text-green-900 shadow-md transform scale-[1.01]";
                                                    else if (isSelected && !option.isCorrect) stateClass = "bg-red-100 border-red-500 text-red-900";
                                                    else stateClass = "opacity-50 border-gray-200 pointer-events-none";
                                                } else if (hasAnswered && mode === 'Exam') {
                                                    if (isSelected) stateClass = `${theme.primary} text-white`;
                                                    else stateClass = "opacity-60 hover:opacity-100 hover:border-gray-400"; 
                                                }

                                                if (isEliminated) stateClass = "opacity-20 line-through pointer-events-none";

                                                return (
                                                    <div key={idx} onClick={() => handleAnswer(idx)} 
                                                         className={`p-4 rounded-xl transition-all duration-200 flex items-start gap-4 ${stateClass}`}>
                                                        <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 mt-0.5
                                                            ${isSelected ? 'border-current bg-current' : 'border-gray-400'}`}>
                                                            {isSelected && <div className="w-2 h-2 rounded-full bg-white"></div>}
                                                        </div>
                                                        <div className="flex-1">
                                                            <p className="text-lg leading-relaxed">{option.text}</p>
                                                            
                                                            {hasAnswered && mode === 'Comprehensive' && (
                                                                <p className={`mt-2 text-sm italic ${option.isCorrect ? 'text-green-700' : 'text-red-700 opacity-80'}`}>
                                                                    <i className={`fa-solid ${option.isCorrect ? "fa-check-circle" : "fa-times-circle"} inline ml-1`}></i>
                                                                    {option.rationale}
                                                                </p>
                                                            )}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}

                                    <div className="flex justify-between items-center mt-auto pt-4 border-t border-gray-200 border-opacity-20">
                                        <div className="flex gap-2">
                                            <button onClick={() => setShowHint(!showHint)} className={`p-2 rounded-full border transition-all ${showHint ? 'bg-yellow-100 text-yellow-700 border-yellow-400' : 'border-gray-400 hover:bg-yellow-50 hint-pulse'}`} title="إظهار التلميح">
                                                <i className="fa-solid fa-lightbulb text-lg"></i>
                                            </button>
                                            <button onClick={eliminate5050} disabled={eliminated[currentIndex] || hasAnswered} className={`px-3 py-1.5 rounded-full text-sm font-bold border transition ${eliminated[currentIndex] ? 'opacity-30' : 'border-purple-400 text-purple-600 hover:bg-purple-50'}`} title="حذف إجابتين خاطئتين">
                                                50/50
                                            </button>
                                            <button onClick={() => setQuickReviewMode(!quickReviewMode)} className="px-3 py-1.5 rounded-full text-sm font-bold border border-blue-400 text-blue-600 hover:bg-blue-50" title="المراجعة السريعة للإجابة">
                                                <i className="fa-solid fa-bolt inline ml-1"></i> مراجعة
                                            </button>
                                        </div>

                                        <div className="flex gap-3">
                                            <button disabled={currentIndex === 0} onClick={() => {setCurrentIndex(curr => curr - 1); setShowHint(false); setQuickReviewMode(false);}} className={`px-6 py-2 rounded-xl font-bold transition ${currentIndex === 0 ? 'opacity-30 cursor-not-allowed' : `bg-gray-200 text-black hover:bg-gray-300`}`}>
                                                السابق
                                            </button>
                                            
                                            {currentIndex === activeMCQs.length - 1 ? (
                                                <button onClick={() => setScreen('review')} className={`px-6 py-2 rounded-xl font-bold text-white transition ${theme.primary} shadow-md hover:scale-105`}>
                                                    تسليم
                                                </button>
                                            ) : (
                                                <button onClick={() => {setCurrentIndex(curr => curr + 1); setShowHint(false); setQuickReviewMode(false);}} className={`px-8 py-2 rounded-xl font-bold text-white transition ${theme.primary} shadow-md hover:scale-105 flex items-center gap-2`}>
                                                    التالي <i className="fa-solid fa-arrow-left"></i>
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                    
                                    {showHint && !quickReviewMode && (
                                        <div className="absolute bottom-24 right-1/2 transform translate-x-1/2 w-11/12 max-w-md bg-yellow-100 border border-yellow-400 text-yellow-900 p-4 rounded-xl shadow-2xl fade-in z-10 flex items-start gap-3">
                                            <i className="fa-solid fa-info-circle text-xl flex-shrink-0 mt-0.5"></i>
                                            <div>
                                                <h4 className="font-bold text-sm uppercase tracking-wide mb-1">تلميح إرشادي</h4>
                                                <p className="text-sm font-medium">{currentQ.hint}</p>
                                            </div>
                                            <button onClick={() => setShowHint(false)} className="mr-auto opacity-50 hover:opacity-100"><i className="fa-solid fa-times"></i></button>
                                        </div>
                                    )}

                                </div>
                            </div>
                        </div>

                        {activeSnap && (
                            <div className="fixed inset-0 bg-black bg-opacity-80 z-[100] flex flex-col items-center justify-center p-4 fade-in" onClick={() => setActiveSnap(null)}>
                                <div className="bg-white rounded-xl overflow-hidden max-w-4xl w-full shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                    <div className="p-4 bg-slate-100 border-b flex justify-between items-center">
                                        <h3 className="font-bold text-lg text-slate-800"><i className="fa-solid fa-camera ml-2"></i>مرجع المحاضرة</h3>
                                        <button onClick={() => setActiveSnap(null)} className="w-8 h-8 rounded-full bg-slate-200 text-slate-600 hover:bg-red-500 hover:text-white flex items-center justify-center transition">
                                            <i className="fa-solid fa-times"></i>
                                        </button>
                                    </div>
                                    <div className="p-4 bg-slate-50 flex justify-center">
                                        <img src={`https://placehold.co/800x450/e2e8f0/1e293b?text=%D9%85%D8%B1%D8%AC%D8%B9+%D9%85%D9%86+%D8%A7%D9%84%D9%85%D9%82%D8%B1%D8%B1%5Cn${encodeURIComponent(activeSnap.page)}`} alt="Lecture Snap" className="rounded shadow-sm w-full h-auto object-contain max-h-[70vh]" />
                                    </div>
                                    <div className="p-3 bg-slate-100 text-center text-sm text-slate-600 italic border-t">
                                        *هذه صورة محاكاة للمرجع النصي في {activeSnap.page}.
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                );
            }

            // Review / Results Screen
            if (screen === 'review') {
                const score = calculateScore();
                const total = activeMCQs.length;
                const percentage = Math.round((score / total) * 100);

                return (
                    <div className={`min-h-screen ${theme.bg} ${theme.text} p-4 md:p-8 fade-in relative`}>
                        <div className={`max-w-5xl mx-auto ${theme.card} p-6 rounded-2xl shadow-xl border ${theme.border}`}>
                            
                            <div className="text-center mb-10 pb-10 border-b border-gray-200 border-opacity-20">
                                <h1 className="text-4xl font-bold mb-4">اكتمل الاختبار!</h1>
                                <div className="inline-flex flex-col items-center justify-center w-40 h-40 rounded-full border-8 border-green-400 bg-green-50 mb-4 shadow-inner">
                                    <span className="text-5xl font-black text-green-600">{percentage}%</span>
                                    <span className="text-sm text-green-700 font-bold">{score} / {total}</span>
                                </div>
                                <p className="text-xl opacity-80">
                                    {percentage >= 90 ? "إتقان ممتاز للمقرر!" : percentage >= 70 ? "عمل جيد، أساسيات صلبة!" : "يُنصح بمراجعة الملاحظات مرة أخرى!"}
                                </p>
                                <div className="mt-6 flex justify-center gap-4">
                                     <button onClick={() => setScreen('setup')} className={`px-6 py-3 rounded-xl font-bold text-white transition ${theme.primary} shadow-md`}>
                                        <i className="fa-solid fa-rotate-right inline ml-2 text-lg"></i> ابدأ جلسة جديدة
                                    </button>
                                </div>
                            </div>

                            <div>
                                <h2 className="text-2xl font-bold mb-6 flex items-center gap-2">
                                    <i className="fa-solid fa-clipboard-list text-2xl"></i> التفسيرات والمراجعة الشاملة
                                </h2>
                                <div className="space-y-6">
                                    {activeMCQs.map((q, idx) => {
                                        const userAnswerIdx = answers[idx];
                                        const isCorrect = userAnswerIdx !== undefined && q.options[userAnswerIdx]?.isCorrect;
                                        const isFlagged = flagged[idx];

                                        return (
                                            <div key={idx} className={`p-6 rounded-xl border ${isCorrect ? 'border-green-200 bg-green-50 bg-opacity-10' : 'border-red-200 bg-red-50 bg-opacity-10'} relative`}>
                                                {isFlagged && <div className="absolute -top-3 -left-3 bg-red-500 text-white p-2 rounded-full shadow-lg"><i className="fa-solid fa-flag"></i></div>}
                                                
                                                <div className="flex gap-2 mb-2">
                                                    <span className="text-xs font-bold px-2 py-1 bg-gray-200 text-black rounded">{q.category}</span>
                                                    <span className="text-xs font-bold px-2 py-1 bg-blue-100 text-blue-800 rounded">{q.page}</span>
                                                    {confidences[idx] && <span className="text-xs font-bold px-2 py-1 bg-purple-100 text-purple-800 rounded">الثقة: {confidences[idx]}</span>}
                                                </div>

                                                <h3 className="text-xl font-medium mb-4">س{idx + 1}. {q.question}</h3>
                                                
                                                <div className="space-y-3">
                                                    {q.options.map((opt, oIdx) => {
                                                        const isSelected = userAnswerIdx === oIdx;
                                                        let style = "border-gray-200 opacity-60";
                                                        if (opt.isCorrect) style = "border-green-500 bg-green-100 text-green-900 opacity-100 shadow-sm font-bold";
                                                        else if (isSelected) style = "border-red-500 bg-red-100 text-red-900 opacity-100 line-through";

                                                        return (
                                                            <div key={oIdx} className={`p-3 rounded-lg border ${style} flex flex-col`}>
                                                                <div className="flex items-center gap-2">
                                                                    {opt.isCorrect && <i className="fa-solid fa-check-circle text-lg text-green-600"></i>}
                                                                    {isSelected && !opt.isCorrect && <i className="fa-solid fa-times-circle text-lg text-red-600"></i>}
                                                                    <span>{opt.text} {isSelected && '(إجابتك)'}</span>
                                                                </div>
                                                                <div className={`mt-2 text-sm italic ${opt.isCorrect ? 'text-green-800' : 'text-gray-600'}`}>
                                                                    التبرير: {opt.rationale}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                    {userAnswerIdx === undefined && <p className="text-red-500 font-bold mt-2"><i className="fa-solid fa-exclamation-circle inline ml-1"></i> لقد قمت بتخطي هذا السؤال.</p>}
                                                    
                                                    {showSnaps && (
                                                        <button onClick={() => setActiveSnap(q)} className="mt-4 px-4 py-2 bg-gray-100 border border-gray-300 text-gray-700 rounded-lg text-sm font-bold flex items-center gap-2 hover:bg-gray-200 transition w-max">
                                                            <i className="fa-solid fa-file-lines"></i> عرض مرجع المقرر
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {activeSnap && (
                            <div className="fixed inset-0 bg-black bg-opacity-80 z-[100] flex flex-col items-center justify-center p-4 fade-in" onClick={() => setActiveSnap(null)}>
                                <div className="bg-white rounded-xl overflow-hidden max-w-4xl w-full shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                    <div className="p-4 bg-slate-100 border-b flex justify-between items-center">
                                        <h3 className="font-bold text-lg text-slate-800"><i className="fa-solid fa-camera ml-2"></i>مرجع المحاضرة</h3>
                                        <button onClick={() => setActiveSnap(null)} className="w-8 h-8 rounded-full bg-slate-200 text-slate-600 hover:bg-red-500 hover:text-white flex items-center justify-center transition">
                                            <i className="fa-solid fa-times"></i>
                                        </button>
                                    </div>
                                    <div className="p-4 bg-slate-50 flex justify-center">
                                        <img src={`https://placehold.co/800x450/e2e8f0/1e293b?text=%D9%85%D8%B1%D8%AC%D8%B9+%D9%85%D9%86+%D8%A7%D9%84%D9%85%D9%82%D8%B1%D8%B1%5Cn${encodeURIComponent(activeSnap.page)}`} alt="Lecture Snap" className="rounded shadow-sm w-full h-auto object-contain max-h-[70vh]" />
                                    </div>
                                    <div className="p-3 bg-slate-100 text-center text-sm text-slate-600 italic border-t">
                                        *هذه صورة محاكاة للمرجع النصي في {activeSnap.page}.
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                );
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
